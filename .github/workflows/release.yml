name: Release

# Build the all-in-one binaries (control plane + host agent + embedded web UI) and
# attach them to a GitHub Release. Triggers on a pushed v* tag, or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/name for a manual release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # build-agent.sh builds the web SPA, embeds it, and cross-compiles all three
      # targets from this linux host using the pinned official bun.
      - name: Build all-in-one binaries
        run: bun run build:agent

      # The control plane verifies downloaded binaries against this before caching +
      # serving them to (root-running) agents, so it's a required release asset. Hash
      # bare filenames (run from dist/) so the names match the binary-store lookup.
      - name: Checksums
        run: cd dist && sha256sum sc-agent-linux-x64 sc-agent-mac-x64 sc-agent-windows-x64.exe > SHA256SUMS

      - name: Compute release tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist/sc-agent-linux-x64
            dist/sc-agent-mac-x64
            dist/sc-agent-windows-x64.exe
            dist/SHA256SUMS
